[module/network]

type = internal/network
interface = wlan0
interval = 3.0

label-connected = ""
format-connected = <ramp-signal>
format-connected-padding = 2

format-disconnected = вқҢ
; format-disconnected-padding = 2

; ramp-signal-0 = вҖўв—Ұв—Ұв—Ұв—Ұ
; ramp-signal-1 = вҖўвҖўв—Ұв—Ұв—Ұ
; ramp-signal-2 = вҖўвҖўвҖўв—Ұв—Ұ
; ramp-signal-3 = вҖўвҖўвҖўвҖўв—Ұ
; ramp-signal-4 = вҖўвҖўвҖўвҖўвҖў

; ramp-signal-0 = вҖў----
; ramp-signal-1 = вҖўвҖў---
; ramp-signal-2 = вҖўвҖўвҖў--
; ramp-signal-3 = вҖўвҖўвҖўвҖў-
