[module/network]

type = internal/network
interface = wlan0
interval = 3.0

label-connected = ""
format-connected = %{T3}<ramp-signal>%{T-}
format-connected-padding = 2

format-disconnected = ❌
; format-disconnected-padding = 2

; ramp-signal-0 = •◦◦◦◦
; ramp-signal-1 = ••◦◦◦
; ramp-signal-2 = •••◦◦
; ramp-signal-3 = ••••◦
; ramp-signal-4 = •••••

; ramp-signal-0 = •----
