[colors]

white = #fff
black = #000
# brightGreen, for current window
brightGreen = #38fc44
# a deeper green for visible windows
deepGreen = #48aa01
# a magenta for urgent
magenta = #f40756

# power icons
power = #e59e9e

#**************************************************************************#
[bar/mybar]

height = 2%
#override-redirect = true
fixed-center = true
; repeats for all monitors
monitor = ${env:MONITOR:}
; need this for underlining!
line-size = 2
padding = 3
module-margin = 1

# green background
#foreground = #a4f280
#foreground = #8ef260
foreground = #7ff9a8
background = #0f1c17


# that time i went purple
#foreground = #f7c5ec
#background = #000000


font-0 =Ubuntu Mono Ligaturized:style=Regular:size=12;2
font-1 =Noto Sans Symbols 2:style=Regular:size=11;3
font-2 =Noto Color Emoji:style=Regular:scale=9;2
font-3 =Source Code Pro:style=Regular:size=10;2
font-4 =Noto Sans:style=Regular:size=10;2
font-5 =Noto Sans Mono CJK KR:style=Regular:size=10;2

modules-center = date
modules-left = i3 pulseaudio spotify
modules-right = backlight network battery powermenu

#**************************************************************************#
[module/date]

type = internal/date
interval = 1.0
# fullDay, dayNum fullMonth | 14:23:10
# date = %A, %d %B | %t %X
date = %A, %B %d %t %X

#**************************************************************************#
[module/battery]

type = internal/battery
; This is useful in case the battery never reports 100% charge
;full-at = 99

battery = BAT0
adapter = AC

poll-interval = 5

format-charging = <label-charging>
label-charging = вҡЎ %percentage%%
format-charging-padding = 2

format-discharging = <label-discharging> 
label-discharging = вҶ“ %percentage%%
format-discharging-padding = 2


label-full = вқӨ %percentage%%
format-full-padding = 2

;<ramp-capacity>
;ramp-capacity-0 = вҖўв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұ
;ramp-capacity-1 = вҖўвҖўв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұ
;ramp-capacity-2 = вҖўвҖўвҖўв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұ
;ramp-capacity-3 = вҖўвҖўвҖўвҖўв—Ұв—Ұв—Ұв—Ұв—Ұв—Ұ
;ramp-capacity-4 = вҖўвҖўвҖўвҖўвҖўв—Ұв—Ұв—Ұв—Ұв—Ұ
;ramp-capacity-5 = вҖўвҖўвҖўвҖўвҖўвҖўв—Ұв—Ұв—Ұв—Ұ
;ramp-capacity-6 = вҖўвҖўвҖўвҖўвҖўвҖўвҖўв—Ұв—Ұв—Ұ
;ramp-capacity-7 = вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўв—Ұв—Ұ
;ramp-capacity-8 = вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўв—Ұ
;ramp-capacity-9 = вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖў
;
;<ramp-capacity>
;ramp-capacity-0 = вҖў---------
;ramp-capacity-1 = вҖўвҖў--------
;ramp-capacity-2 = вҖўвҖўвҖў-------
;ramp-capacity-3 = вҖўвҖўвҖўвҖў------
;ramp-capacity-4 = вҖўвҖўвҖўвҖўвҖў-----
;ramp-capacity-5 = вҖўвҖўвҖўвҖўвҖўвҖў----
;ramp-capacity-6 = вҖўвҖўвҖўвҖўвҖўвҖўвҖў---
;ramp-capacity-7 = вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖў--
;ramp-capacity-8 = вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖў-
