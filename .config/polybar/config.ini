; ramp-signal-3 = вҳ…вҳ…вҳ…вҳ…вҳҶ
; ramp-signal-4 = вҳ…вҳ…вҳ…вҳ…вҳ…

ramp-signal-0 = рҹҢ‘
ramp-signal-1 = рҹҢ’
ramp-signal-2 = рҹҢ“
ramp-signal-3 = рҹҢ”
ramp-signal-4 = рҹҢ•

#**************************************************************************#


[module/spotify]
type = custom/script
interval = 1
format-prefix = "вҷ« "
format = <label>
format-padding = 2
exec = python3 dotfiles/scripts/spotify_status.py -t 50 -p 'вҸёпёҺ,вҸөпёҺ'
;control players (optional)
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify previous
click-middle = playerctl --player=spotify next

format-foreground = #E2C2FF
#**************************************************************************#
[section/spotifyd]
type = custom/script
exec-if = ps -A | grep spt

[module/spotifyd]
inherit = section/spotifyd 
interval = 1
format-prefix = "вҷ« "
format = <label>
;format-padding = 2
#exec = python3 dotfiles/scripts/spotify_status.py -t 50 -p 'вҸёпёҺ,вҸөпёҺ'
exec = spt pb --status -f %a:\ %t
;;control players (optional)
;; click-left = playerctl --player=spotify play-pause 
;; click-right = playerctl --player=spotify previous
;; click-middle = playerctl --player=spotify next
click-left = spt playback --toggle
click-right = spt playback --previous
click-middle = spt playback --next


;format-foreground = #E2C2FF

#**************************************************************************#
[module/powermenu]
type = custom/menu

expand-right = false

label-open = вҸ»
label-close = рҹ—ҷ

menu-0-0 = " вҸҫ "
menu-0-0-exec = systemctl suspend && /home/krithika/dotfiles/.config/i3/lock.sh
menu-0-1 = " вҸј "
menu-0-1-exec = systemctl suspend-then-hibernate
menu-0-2 = " вӯҳ "
menu-0-2-exec = systemctl poweroff

format-foreground = ${colors.power}
format-padding = 1
