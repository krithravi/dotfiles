#**************************************************************************#
[module/pulseaudio]

type = internal/pulseaudio

format-volume = %{T3}рҹ”Ҡ %{T-}<bar-volume>
format-volume-padding = 2
format-volume-foreground = #2ed2f7

bar-volume-width = 20
bar-volume-indicator = рҹҰҺ

bar-volume-fill = в”Җ
bar-volume-empty = в”Җ


format-muted = %{T3}рҹ”Ү %{T-}<bar-volume>
format-muted-padding = 2
format-muted-foreground = #177084

click-right = pavucontrol
#**************************************************************************#
[module/i3]
type = internal/i3
index-sort = true
pin-workspaces = true
format = <label-state>

label-focused =  %index%
label-focused-padding = 1
label-focused-underline = ${colors.brightGreen}

label-unfocused =  %index%
label-unfocused-padding = 1

label-visible = %index%
label-visible-padding = 1
label-visible-underline = ${colors.deepGreen}

label-urgent =  %index%
label-urgent-padding = 1
label-urgent-underline = ${colors.magenta}

;label-separator = |
;label-separator-padding = 1
;label-separator-foreground = #ffb52a
#**************************************************************************#
[module/backlight]
type = internal/backlight
card = amdgpu_bl1
use-actual-brightness = true
enable-scroll = true

format = вңЁ <label>
; bar-width = 20
; bar-indicator = вңЁ
; bar-fill = в”Җ
; bar-empty = в”Җ

