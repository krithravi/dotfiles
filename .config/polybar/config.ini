[colors]

white = #fff
black = #000
# brightGreen, for current window
brightGreen = #38fc44
# a deeper green for visible windows
deepGreen = #48aa01
# a magenta for urgent
magenta = #f40756

# power icons
power = #e59e9e

# monitor
display = #a8db99

#**************************************************************************#
[bar/mybar]

height = 2%
#override-redirect = true
fixed-center = true
; repeats for all monitors
monitor = ${env:MONITOR:}
; need this for underlining!
line-size = 2
padding = 3
module-margin = 1

# green background
#foreground = #a4f280
#foreground = #8ef260
foreground = #7ff9a8
background = #0f1c17


# that time i went purple
#foreground = #f7c5ec
#background = #000000


font-0 =Ubuntu Mono Ligaturized:style=Regular:size=12;2
# font-1 =Noto Sans Symbols 2:style=Regular:size=11;3
font-1 =Noto Color Emoji:style=Regular:scale=9;2
font-2 =Noto Sans Symbols 2:style=Regular:size=11;3
# font-3 =Source Code Pro:style=Regular:size=10;2
# font-4 =Noto Sans:style=Regular:size=10;2
# font-5 =Noto Sans Mono CJK KR:style=Regular:size=10;2

modules-center = date
modules-left = i3 display pipewire-simple spotify firefox
modules-right = system-bluetooth-bluetoothctl backlight network battery powermenu

#**************************************************************************#
[module/date]

type = internal/date
interval = 1.0
# fullDay, dayNum fullMonth | 14:23:10
# date = %A, %d %B | %t %X
date = %A, %B %d %t %X

#**************************************************************************#
[module/battery]

type = internal/battery
; This is useful in case the battery never reports 100% charge
;full-at = 99

battery = BAT0
adapter = AC

poll-interval = 5

format-charging = <label-charging>
label-charging = %{T2}⚡%{T-}%percentage%%
format-charging-padding = 2

format-discharging = <label-discharging> 
label-discharging = %{T2}🔻%{T-}%percentage%%
format-discharging-padding = 2


label-full = %{T2}❤%{T-}%percentage%%
format-full-padding = 2

;<ramp-capacity>
;ramp-capacity-0 = •◦◦◦◦◦◦◦◦◦
;ramp-capacity-1 = ••◦◦◦◦◦◦◦◦
;ramp-capacity-2 = •••◦◦◦◦◦◦◦
;ramp-capacity-3 = ••••◦◦◦◦◦◦
;ramp-capacity-4 = •••••◦◦◦◦◦
;ramp-capacity-5 = ••••••◦◦◦◦
;ramp-capacity-6 = •••••••◦◦◦
;ramp-capacity-7 = ••••••••◦◦
;ramp-capacity-8 = •••••••••◦
;ramp-capacity-9 = ••••••••••
;
;<ramp-capacity>
;ramp-capacity-0 = •---------
;ramp-capacity-1 = ••--------
;ramp-capacity-2 = •••-------
;ramp-capacity-3 = ••••------
;ramp-capacity-4 = •••••-----
;ramp-capacity-5 = ••••••----
;ramp-capacity-6 = •••••••---
;ramp-capacity-7 = ••••••••--
;ramp-capacity-8 = •••••••••-
;ramp-capacity-9 = ••••••••••
